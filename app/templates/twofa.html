{% extends "base.html" %}
{% block content %}
<div class="panel login-box">
  <h2>Two-factor authentication</h2>
  <p class="muted">Enter the 6-digit code from your authenticator app.</p>
  {% if request.query_params.get('error') %}<p class="error">{{ request.query_params.get('error') }}</p>{% endif %}
  <form method="post" action="/auth/2fa">
    <p><input name="code" placeholder="123 456" required autofocus autocomplete="one-time-code"
              inputmode="numeric" pattern="[0-9 ]*"></p>
    <button style="width:100%">Verify</button>
  </form>
</div>
{% endblock %}
