{% extends "base.html" %}
{% block content %}
<h1>Cases</h1>
<div class="panel">
  <h3>New case</h3>
  <form method="post" action="/cases">
    <p><input name="name" placeholder="Case name (e.g. WEB-2026-001 defacement)" required></p>
    <p><textarea name="description" rows="2" placeholder="Description"></textarea></p>
    <p>
      <select name="severity" style="width:auto">
        <option>low</option><option selected>medium</option>
        <option>high</option><option>critical</option>
      </select>
      <button>Create</button>
    </p>
  </form>
</div>
<div class="panel">
  <table>
    <tr><th>ID</th><th>Name</th><th>Severity</th><th>Status</th><th>Created by</th><th>Created</th></tr>
    {% for c in cases %}
    <tr>
      <td>{{ c.id }}</td>
      <td><a href="/cases/{{ c.id }}">{{ c.name }}</a></td>
      <td><span class="badge {{ c.severity }}">{{ c.severity }}</span></td>
      <td><span class="badge {{ c.status }}">{{ c.status }}</span></td>
      <td>{{ c.created_by }}</td>
      <td class="muted">{{ c.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
    </tr>
    {% else %}
    <tr><td colspan="6" class="muted">No cases yet.</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
